<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="style.css">
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservation Form</title>
</head>

<body>
  <div class="section">
        <h1>Reservation Form</h1>
        <p>
          You have selected: <span id="selected-time"></span>. <br>
            <br>
          Please fill out the information below to reserve your spot. Once you fill 
          out the form, a confirmation email will be sent with more details 
          about the event, including a cancellation link if you need to cancel.<br>
        </p>

        <form id="reservation-form">
            <label for="name">Enter your first and last name: </label>
            <input type="text" id="name" name="name"><br>
        </form>

        <form id="reservation-form">
            <label for="partySize">How many people are in your party?</label>
            <input type="radio" id="1" name="partySize" value="1">
            <input type="radio" id="2" name="partySize" value="2">
            <input type="radio" id="3" name="partySize" value="3">
            <input type="radio" id="4" name="partySize" value="4">
            <br>
        </form>

      <form id="reservation-form">
          <label for="email">Please enter your CofC email address: </label>
          <input type="text" id="email" name="email>
          <br>
      </form>
  
</div>
        <script>
          const str = window.location.search;
          const urlParam = new URLSearchParams(str);
          
          const time = urlParam.get('time');
    
          document.getElementById("selected-time").innerText = time;
          
      </script>
</body>



</html>
