<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="style.css">
    
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservation Form</title>
</head>

<body>
  <div class="section">
        <h1>Reservation Form</h1>
        <p>
          You have selected: <span id="selected-time"></span>. <br>
            <br>
          Please fill out the information below to reserve your spot. Once you fill 
          out the form, a confirmation email will be sent with more details 
          about the event, including a cancellation link if you need to cancel.<br>
        </p>

        <form id="reservation-form">
            <label for="name">Enter your first and last name: </label>
            <input type="text" id="name" name="name"><br><br>

            <label for="partySize">How many people are in your party?</label><br>
            <input type="radio" id="1" name="partySize" value="1">
                        <label for="partySize">1</label> <br>
            <input type="radio" id="2" name="partySize" value="2">
                        <label for="partySize">2</label> <br>
            <input type="radio" id="3" name="partySize" value="3">
                        <label for="partySize">3</label><br>
            <input type="radio" id="4" name="partySize" value="4">
                        <label for="partySize">4</label>
            
            <br>
            <br>

          <label for="email">Please enter your CofC email address: </label>
          <input type="email" id="email" name="email">
          <p id="email-error" style="color:red; display: none;">Please enter a valid CofC email address.</p>
          <br>

          <input type="button" value="Submit" onclick="checkEmail()">
      </form>
  
</div>
        <script>
          const str = window.location.search;
          const urlParam = new URLSearchParams(str);
          
          const time = urlParam.get('time');
    
          document.getElementById("selected-time").innerText = time;

          function checkEmail() {
              const email = document.getElementById("email").value;
              
              // if it is a valid cofc email
              if (email.endsWith("@g.cofc.edu") || email.endsWith("@cofc.edu")) {
                  document.getElementById("email-error").style.display = "none";
                  submitForm();
              } else { // otherwise give them an error message
                document.getElementById("email-error").style.display = "block";
              }
          }

        function submitForm() {
            const formData = {
                time : time,
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                partySize: document.querySelector('input[name="partySize"]:checked').value
            };

            window.location.href = "https://script.google.com/macros/s/AKfycbzAAwpFWHbbrn9AFIzbMhtmrUBj7pATgILe84uMtK-MpZCvj1o7SXZ4gHnboTn8wNsPJw/exec" + 
              "?time=" + encodeURIComponent(time) + 
              "&name=" + encodeURIComponent(formData.name) + 
              "&email=" + encodeURIComponent(email) + 
              "&partySize=" + encodeURIComponent(formData.partySize);
            
        }
          
      </script>
</body>



</html>
